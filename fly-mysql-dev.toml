app = "restarters-dev-db"
primary_region = "lhr"

[build]
  image = "mysql:8.0"

[processes]
  app = "mysqld --datadir=/data/mysql --default-authentication-plugin=mysql_native_password"

[mounts]
  source = "mysqldata_dev"
  destination = "/data"

[env]
  MYSQL_DATABASE = "restarters"
  MYSQL_USER = "restarters"

[[vm]]
  size = "shared-cpu-2x"
  memory = 4096
