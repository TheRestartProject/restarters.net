app = "restarters-db"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile.mysql"

[processes]
  app = "mysqld --datadir=/data/mysql --default-authentication-plugin=mysql_native_password --innodb_buffer_pool_size=2800M --log_bin_trust_function_creators=ON"

[mounts]
  source = "mysqldata"
  destination = "/data"

[env]
  MYSQL_DATABASE = "restarters"
  MYSQL_USER = "restarters"

[[vm]]
  size = "performance-2x"
  memory = 4096
