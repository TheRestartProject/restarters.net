user www-data;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format timed '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log timed;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name _;

        root /var/www/public;

        index index.php;

        charset utf-8;

        # Cookie-based site gate (dev/staging only). Generated by startup.sh:
        #   enabled:  auth_request /_auth_check; error_page 401 = @auth_gate;
        #   disabled: empty file
        # auth_request makes a subrequest to /_auth_check on every request. If the
        # PHP script returns 200 (valid cookie) the request proceeds; if 401, nginx
        # serves the @auth_gate named location which redirects to the login page.
        # No WWW-Authenticate header is ever sent, so the browser never shows a dialog.
        include /etc/nginx/auth-gate.conf;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS - Fly.io terminates TLS, but this tells browsers to always use HTTPS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Auth subrequest handler — checks the site_auth cookie.
        location = /_auth_check {
            internal;
            fastcgi_pass unix:/var/run/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/public/_auth_check.php;
            fastcgi_pass_request_body off;
            fastcgi_param CONTENT_LENGTH "";
            include fastcgi_params;
        }

        # Login form — exempt from auth_request so it's always reachable.
        location = /_login {
            auth_request off;
            fastcgi_pass unix:/var/run/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/public/_auth_login.php;
            include fastcgi_params;
        }

        # Redirect to login, preserving the originally requested URL.
        location @auth_gate {
            return 302 /_login?next=$request_uri;
        }

        # Proxy /uploads/ to Tigris S3 bucket (read-only).
        # TIGRIS_BUCKET_URL and TIGRIS_BUCKET_HOST are substituted at startup
        # via envsubst in startup.sh.
        location /uploads/ {
            limit_except GET HEAD {
                deny all;
            }

            # Fly.io internal DNS resolver — required for nginx to resolve
            # the Tigris hostname at request time rather than only at startup.
            resolver [fdaa::3] 8.8.8.8 valid=300s;
            resolver_timeout 5s;

            set $tigris_upstream ${TIGRIS_BUCKET_URL};
            # When proxy_pass uses a variable, nginx does NOT strip the
            # location prefix automatically. We must rewrite it ourselves.
            rewrite ^/uploads/(.*)$ /$1 break;
            proxy_pass $tigris_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host ${TIGRIS_BUCKET_HOST};
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;
            proxy_hide_header x-amz-meta-s3cmd-attrs;
            proxy_intercept_errors on;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; auth_request off; }
        location = /robots.txt  { access_log off; auth_request off; }

        location = /fpm-status {
            auth_request off;
            allow 127.0.0.1;
            allow ::1;
            allow fdaa::/16;
            deny all;
            fastcgi_pass 127.0.0.1:9001;
            fastcgi_param SCRIPT_FILENAME /fpm-status;
            include fastcgi_params;
        }

        error_page 404 /index.php;

        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=100M";
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
